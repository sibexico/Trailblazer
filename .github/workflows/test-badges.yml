name: Tests and Badge Update

on:
  push:

permissions:
  contents: write

jobs:
  test-and-update-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests with coverage
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Build badges and update README
        id: badges
        shell: bash
        env:
          ACTIONS_URL: https://github.com/${{ github.repository }}/actions
        run: |
          set -euo pipefail

          if [[ ! -f README.md ]]; then
            echo "README.md is required for badge updates"
            exit 1
          fi

          if [[ "${{ steps.tests.outcome }}" == "success" ]]; then
            test_status="Passed"
            test_color="green"
          else
            test_status="Failed"
            test_color="red"
          fi

          coverage="0.0"
          if [ -f coverage.out ]; then
            coverage="$(go tool cover -func=coverage.out | awk '/^total:/{gsub("%", "", $3); print $3}')"
          fi

          coverage="$(awk -v c="$coverage" 'BEGIN {printf "%.1f", c + 0}')"

          if awk -v c="$coverage" 'BEGIN {exit !(c >= 70)}'; then
            coverage_color="green"
          elif awk -v c="$coverage" 'BEGIN {exit !(c >= 50)}'; then
            coverage_color="yellow"
          else
            coverage_color="red"
          fi

          coverage_label="${coverage}%25"

          test_badge="https://img.shields.io/badge/Tests-${test_status}-${test_color}?labelColor=gray&logo=github"
          coverage_badge="https://img.shields.io/badge/Tests%20Coverage-${coverage_label}-${coverage_color}?labelColor=gray&logo=gitextensions"

          test_line="[![Tests passed](${test_badge})](${ACTIONS_URL})"
          coverage_line="[![Tests coverage](${coverage_badge})](${ACTIONS_URL})"

          awk -v test_line="$test_line" -v coverage_line="$coverage_line" '
            {
              if ($0 ~ /\[Tests passed\]/) {
                print test_line
                next
              }
              if ($0 ~ /\[Tests coverage\]/) {
                print coverage_line
                next
              }
              print
            }
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commit README badge updates
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- README.md; then
            echo "README.md already up to date"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: update test and coverage badges"
            git push
          fi

      - name: Fail workflow when tests failed
        if: steps.tests.outcome != 'success'
        shell: bash
        run: |
          echo "Tests failed. Badges were updated to reflect the failed run."
          exit 1
